AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Simple serverless API: API Gateway (HTTP API) -> Lambda -> DynamoDB.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128

Parameters:
  TableName:
    Type: String
    Default: items-table

Resources:
  ItemsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  ApiHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: api-handler.handler
      CodeUri: ../lambda-samples/
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
      Events:
        GetItems:
          Type: HttpApi
          Properties:
            Path: /items
            Method: get
        CreateItem:
          Type: HttpApi
          Properties:
            Path: /items
            Method: post

Outputs:
  ApiUrl:
    Description: Base URL for the HTTP API
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  TableName:
    Value: !Ref ItemsTable
